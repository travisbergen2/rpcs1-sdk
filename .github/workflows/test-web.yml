name: Test Web and MCP

on:
  push:
    branches: [main, develop]
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/core/**"
      - "packages/web/**"
      - "server.json"
      - ".github/workflows/test-web.yml"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/core/**"
      - "packages/web/**"
      - "server.json"
      - ".github/workflows/test-web.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test core
        run: npm run test --workspace=packages/core

      - name: Test MCP contract
        run: npm run test --workspace=packages/web

      - name: Build production app
        run: npm run build

      - name: Lint web
        run: npm run lint --workspace=packages/web
