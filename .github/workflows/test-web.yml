name: Test TypeScript Core

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - ".github/workflows/test-web.yml"
  pull_request:
    paths:
      - "packages/core/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm --filter @rpcs1/core build

      - name: Test core
        run: pnpm --filter @rpcs1/core test

      - name: Type-check core
        run: pnpm --filter @rpcs1/core lint
